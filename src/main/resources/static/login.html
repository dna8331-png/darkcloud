<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DarkCloud — Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0c10;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-box {
    background: #111318;
    border: 1px solid #1f2430;
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #1d4ed8, #7c3aed);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    margin: 0 auto 12px;
  }
  .logo h1 { font-size: 22px; font-weight: 700; color: #e2e8f0; }
  .logo p { font-size: 12px; color: #6b7a99; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 12px; color: #6b7a99; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  input {
    width: 100%;
    padding: 11px 14px;
    background: #181c22;
    border: 1px solid #1f2430;
    border-radius: 8px;
    color: #e2e8f0;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #3b82f6; }
  .btn-login {
    width: 100%;
    padding: 12px;
    background: #3b82f6;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
  }
  .btn-login:hover { background: #2563eb; }
  .error {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #ef4444;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .footer-text { text-align: center; margin-top: 20px; font-size: 11px; color: #6b7a99; }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <div class="logo-icon">☁️</div>
    <h1>DarkCloud</h1>
    <p>Threat Intel Platform</p>
  </div>
  <div class="error" id="error-msg">Invalid username or password!</div>
  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username"/>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password"/>
  </div>
  <button class="btn-login" onclick="login()">Sign In</button>
  <div class="footer-text">DarkCloud Threat Intelligence System</div>
</div>

<script>
const USERS = [
  { username: 'admin', password: 'admin123' },
  { username: 'danish', password: 'danish123' },
  { username: 'haseeb', password: 'haseeb123' },
];

function login() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  const user = USERS.find(x => x.username === u && x.password === p);
  if (user) {
    sessionStorage.setItem('loggedIn', 'true');
    sessionStorage.setItem('username', u);
    window.location.href = 'darkcloud.html';
  } else {
    document.getElementById('error-msg').style.display = 'block';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
